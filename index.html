<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#1466d6" />
  <meta name="description" content="大学受験向け地理一問一答Webアプリ" />
  <title>地理一問一答｜大学受験対策</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="style.css?v=31" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TRETLQYNV"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    const gaDebugMode = new URLSearchParams(window.location.search).get('ga_debug') === '1';
    gtag('config', 'G-TRETLQYNV', gaDebugMode ? { debug_mode: true } : {});
    if (gaDebugMode) {
      gtag('event', 'ga_debug_check', {
        debug_mode: true,
        event_category: 'diagnostics',
        event_label: 'manual_debug_url'
      });
    }
  </script>
</head>
<body>
  <div id="app" class="app-shell">
    <header class="topbar">
      <button id="backBtn" class="icon-btn hidden" aria-label="戻る">‹</button>
      <div>
        <p id="eyebrow" class="eyebrow">大学受験対策</p>
        <h1 id="screenTitle">地理一問一答</h1>
      </div>
      <button id="menuBtn" class="icon-btn" aria-label="メニュー">☰</button>
    </header>

    <main id="screen" class="screen" aria-live="polite"></main>

    <nav class="bottom-nav" aria-label="主要メニュー">
      <button data-nav="home" class="nav-item active"><span>⌂</span><small>ホーム</small></button>
      <button data-nav="units" class="nav-item"><span>▤</span><small>単元</small></button>
      <button data-nav="weak" class="nav-item"><span>◎</span><small>苦手</small></button>
      <button data-nav="records" class="nav-item"><span>◔</span><small>記録</small></button>
      <button data-nav="settings" class="nav-item"><span>⚙</span><small>設定</small></button>
    </nav>
  </div>

  <template id="homeTemplate">
    <section class="hero card">
      <div class="globe">🌏</div>
      <p>大学受験地理の知識を、因果関係まで含めて反復します。</p>
      <div class="start-zone" data-action="start" role="button" tabindex="0" aria-label="学習を始める">
        <span class="primary big start-visual">学習を始める</span>
      </div>
    </section>
    <section class="grid-menu category-menu">
      <button class="tile" data-action="group" data-group="natural"><b>🌋</b><span>系統地理（自然）</span></button>
      <button class="tile" data-action="group" data-group="human"><b>🏙️</b><span>系統地理（人文）</span></button>
      <button class="tile" data-action="group" data-group="regional"><b>🌏</b><span>地誌</span></button>
      <button class="tile" data-action="group" data-group="map"><b>🗾</b><span>地図</span></button>
    </section>
    <section class="grid-menu sub-menu">
      <button class="tile" data-action="random"><b>🔀</b><span>ランダム</span></button>
      <button class="tile" data-action="difficulty"><b>Lv</b><span>難度別</span></button>
      <button class="tile" data-action="search"><b>🔎</b><span>問題検索</span></button>
      <button class="tile" data-action="tags"><b>#</b><span>タグ復習</span></button>
      <button class="tile" data-action="weak"><b>🎯</b><span>苦手復習</span></button>
      <button class="tile" data-action="records"><b>📊</b><span>学習記録</span></button>
      <button class="tile" data-action="units"><b>▤</b><span>目次を開く</span></button>
    </section>
    <section class="card stats-card">
      <div class="section-head"><h2>本日の目標</h2><button class="text-btn" data-action="records">詳細</button></div>
      <div class="goal-summary">
        <div><small>今日の学習</small><strong id="todayCount">0/20問</strong></div>
        <div><small>連続学習</small><strong id="streakCount">0日</strong></div>
      </div>
      <div class="progress goal-progress"><i id="goalProgress" style="width:0%"></i></div>
      <p id="goalMessage" class="goal-message">まずは1問から始めましょう。</p>
      <div class="stats-row compact">
        <div><small>正答率</small><strong id="accuracy">0%</strong></div>
        <div><small>復習待ち</small><strong id="weakCount">0問</strong></div>
        <div><small>残り</small><strong id="goalRemain">20問</strong></div>
      </div>
    </section>
    <section class="card quick-card">
      <h2>今日のおすすめ</h2>
      <p id="recommendText">まずは「地形」から始めると、地形条件から気候・農業・地誌へつなげやすくなります。</p>
      <button class="secondary" data-action="recommended">おすすめを解く</button>
    </section>
  </template>

  <script src="data/questions-terrain.js?v=31"></script>
  <script src="data/questions-climate.js?v=31"></script>
  <script src="data/questions-agriculture.js?v=31"></script>
  <script src="data/questions-industry.js?v=31"></script>
  <script src="data/questions-resources-energy.js?v=31"></script>
  <script src="data/questions-population-city.js?v=31"></script>
  <script src="data/questions-transport-trade.js?v=31"></script>
  <script src="data/questions-state-ethnicity-religion.js?v=31"></script>
  <script src="data/questions-regional.js?v=31"></script>
  <script src="data/questions-regional-intermediate.js?v=31"></script>
  <script src="data/questions-map.js?v=31"></script>
  <script src="data/questions-human-intermediate.js?v=31"></script>
  <script src="data/questions-human-advanced.js?v=31"></script>
  <script src="questions.js"></script>
  <script src="app.js?v=31"></script>
</body>
</html>
